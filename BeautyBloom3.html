<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lipstick Shop</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial;
    background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    padding: 20px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.lipstick-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

.swatch {
    height: 100px;
    border-radius: 10px;
    margin-bottom: 10px;
}

button {
    padding: 10px;
    border: none;
    background: #e91e63;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

button:hover {
    background: #c2185b;
}

/* CART */
.cart {
    margin-top: 40px;
    background: white;
    padding: 20px;
    border-radius: 15px;
    display: none;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
}
</style>
</head>

<body>

<div class="container">
    <h1>💄 Lipstick Shop</h1>

    <div id="grid" class="lipstick-grid"></div>

    <!-- ✅ CART SECTION (FIXED) -->
    <div id="cartSection" class="cart">
        <h2>🛒 Cart (<span id="cartCount">0</span>)</h2>
        <div id="cartItems"></div>
        <h3 id="total">$0.00</h3>
    </div>
</div>

<script>
const products = [
    {id:1, name:"Red", color:"#c41e3a", price:20},
    {id:2, name:"Pink", color:"#ff69b4", price:18},
    {id:3, name:"Nude", color:"#d2a679", price:15},
    {id:4, name:"Berry", color:"#800020", price:22}
];

let cart = [];

// Render products
function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    products.forEach(p => {
        grid.innerHTML += `
            <div class="card">
                <div class="swatch" style="background:${p.color}"></div>
                <h3>${p.name}</h3>
                <p>$${p.price}</p>
                <button onclick="add(${p.id})">Add to Cart</button>
            </div>
        `;
    });
}

// Add to cart
function add(id) {
    const item = products.find(p => p.id === id);
    const exist = cart.find(c => c.id === id);

    if (exist) {
        exist.qty++;
    } else {
        cart.push({...item, qty:1});
    }

    updateCart();
}

// Update cart
function updateCart() {
    const section = document.getElementById("cartSection");
    const itemsDiv = document.getElementById("cartItems");
    const count = document.getElementById("cartCount");
    const total = document.getElementById("total");

    if (cart.length === 0) {
        section.style.display = "none";
        return;
    }

    section.style.display = "block";

    let totalPrice = 0;
    let totalItems = 0;

    itemsDiv.innerHTML = "";

    cart.forEach(item => {
        totalPrice += item.price * item.qty;
        totalItems += item.qty;

        itemsDiv.innerHTML += `
            <div class="cart-item">
                <span>${item.name} x ${item.qty}</span>
                <span>$${item.price * item.qty}</span>
            </div>
        `;
    });

    count.textContent = totalItems;
    total.textContent = "Total: $" + totalPrice.toFixed(2);
}

render();
</script>

</body>
</html>
