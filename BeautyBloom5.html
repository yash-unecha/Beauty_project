<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foundation Collection</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf5e6; /* Light cream background from your image */
            margin: 0;
            padding: 40px;
            color: #333;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        /* The Grid Layout */
        .foundation-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 cards per row */
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Individual Card Styling */
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Color Swatch */
        .swatch {
            width: 80px;
            height: 110px;
            border-radius: 8px;
            margin-right: 20px;
            flex-shrink: 0;
        }

        /* Text details */
        .info {
            flex-grow: 1;
        }

        .name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .finish {
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .price {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        /* Button Styling */
        .add-btn {
            background-color: #d85a6d; /* The pinkish-red from your photo */
            color: white;
            border: none;
            padding: 10px 0;
            width: 100%;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        .add-btn:hover {
            background-color: #bc4b5c;
        }

        /* Responsive design for smaller screens */
        @media (max-width: 900px) {
            .foundation-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .foundation-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>🧴 15 Flawless Foundation Shades 🧴</h1>

    <div class="foundation-grid" id="grid">
        </div>

    <script>
        // Data for foundation shades
        const shades = [
            { name: "Porcelain", finish: "Matte Finish", price: "$32.99", color: "#F8E3D2" },
            { name: "Ivory", finish: "Dewy Finish", price: "$32.99", color: "#F3DAC2" },
            { name: "Warm Nude", finish: "Matte Finish", price: "$34.00", color: "#EED1B3" },
            { name: "Honey", finish: "Satin Finish", price: "$32.99", color: "#E7C19E" },
            { name: "Golden", finish: "Matte Finish", price: "$35.00", color: "#D9AE86" },
            { name: "Caramel", finish: "Glow Finish", price: "$32.99", color: "#C68E62" },
            { name: "Chestnut", finish: "Matte Finish", price: "$34.50", color: "#A06B44" },
            { name: "Espresso", finish: "Matte Finish", price: "$32.99", color: "#5F3A25" },
            { name: "Sand", finish: "Natural Finish", price: "$30.99", color: "#EBCBAE" },
            { name: "Almond", finish: "Satin Finish", price: "$32.00", color: "#D19E75" },
            { name: "Toffee", finish: "Matte Finish", price: "$32.99", color: "#B57D52" },
            { name: "Mocha", finish: "Full Coverage", price: "$36.00", color: "#825536" },
            { name: "Sienna", finish: "Matte Finish", price: "$32.99", color: "#734229" },
            { name: "Cocoa", finish: "Natural Finish", price: "$32.99", color: "#4B2C1A" },
            { name: "Truffle", finish: "Deep Matte", price: "$38.00", color: "#3D2216" }
        ];

        const grid = document.getElementById('grid');

        // Loop through the data to create cards
        shades.forEach(shade => {
            const cardHTML = `
                <div class="card">
                    <div class="swatch" style="background-color: ${shade.color}"></div>
                    <div class="info">
                        <div class="name">${shade.name}</div>
                        <div class="finish">${shade.finish}</div>
                        <div class="price">${shade.price}</div>
                        <button class="add-btn">Add to Cart</button>
                    </div>
                </div>
            `;
            grid.innerHTML += cardHTML;
        });
    </script>

</body>
</html>
